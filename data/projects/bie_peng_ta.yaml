beats:
- id: beat_1
  summary: 顾明轩将林晚书包倒扣在地，踩住她的笔记本羞辱。
  emotion: 压抑
  location_id: school_hallway
  characters:
  - lin_wan
  - gu_ming_xuan
  dialogue_first: 顾明轩：“林晚，我说过吧？你这种人，不配坐第一排。”
  dialogue_second: 顾明轩：“求我，我就还你。” 林晚：“还给我。”
  action_first: 教学楼走廊，林晚蹲在地上捡书，书包被人倒扣在地，课本散落一地。顾明轩靠在墙边冷笑，跟班拿手机拍摄起哄。
  action_second: 林晚伸手去拿笔记本，顾明轩一脚踩住。林晚咬唇，低声要求归还，顾明轩俯身逼近。
  production_mode_first: image_to_video
  production_mode_second: image_to_video
- id: beat_2
  summary: 沈砚出现夺回笔记本，并制服推搡他的顾明轩。
  emotion: 对峙
  location_id: school_hallway
  characters:
  - shen_yan
  - gu_ming_xuan
  dialogue_first: 沈砚：“她说，还给她。” 顾明轩：“你谁啊？” 沈砚：“新来的。”
  dialogue_second: 沈砚：“别把欺负人，当成你的特权。”
  action_first: 一只手伸进画面，抓住顾明轩鞋后跟把笔记本抽出。沈砚站在林晚身前，把笔记本递给她，走廊瞬间安静。
  action_second: 顾明轩伸手推沈砚，沈砚侧身避开，反手扣住他手腕压在墙上。动作干净，顾明轩脸色大变。
  production_mode_first: image_to_video
  production_mode_second: image_to_video
- id: beat_3
  summary: 顾明轩搬出家世威胁，沈砚将霸凌证据投屏公开。
  emotion: 震惊
  location_id: school_hallway
  characters:
  - shen_yan
  - gu_ming_xuan
  dialogue_first: 顾明轩：“你知道我爸是谁吗？这学校一栋楼都是我家捐的。” 沈砚：“知道。所以我才等你把话说完。”
  dialogue_second: 周校长：“沈同学，这种事情不要扩大影响，我们去办公室谈。” 沈砚：“不用了。市教育局反校园霸凌专项调查，今天正式进校。我是学生观察员。”
  action_first: 顾明轩咬牙搬出父亲身份威胁，沈砚松开他整理袖口。沈砚拿出手机，投屏到走廊电子公告屏，屏幕上出现顾明轩欺负同学的视频和截图，学生们围观议论。
  action_second: 校长急匆匆赶来试图息事宁人，沈砚拿出一份文件，亮出真实身份。
  production_mode_first: image_to_video
  production_mode_second: image_to_video
- id: beat_4
  summary: 沈砚揭穿校长纵容行径，顾明轩崩溃，林晚终于抬头。
  emotion: 释然
  location_id: school_hallway
  characters:
  - shen_yan
  - lin_wan
  - gu_ming_xuan
  dialogue_first: 沈砚：“周校长，你纵容他的每一次，都在文件里。”
  dialogue_second: 沈砚：“你以为没人敢管你，是因为他们怕你。不是因为你是对的。”
  action_first: 校长脸色瞬间苍白。顾明轩后退一步，脸色惨白。林晚站在沈砚身后，第一次抬起头。
  action_second: 沈砚看向顾明轩，留下最后通牒。顾明轩被带走，林晚紧紧抱着笔记本，眼眶发红。
  production_mode_first: image_to_video
  production_mode_second: image_to_video
